# Dependabot Auto-Merge
#
# Automatically enables auto-merge on Dependabot PRs after all CI checks pass.
# Branch protection rules (configured separately) ensure CI checks are required
# before the merge actually completes.
#
# Only minor and patch updates are auto-merged. Major updates require manual review.

name: Dependabot Auto-Merge

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable auto-merge for Dependabot PR
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Check if auto-merge is allowed
        id: check
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        run: |
          # Only auto-merge minor and patch updates
          # Major updates always need manual review
          case "$UPDATE_TYPE" in
            version-update:semver-minor | version-update:semver-patch)
              echo "allowed=true" >> "$GITHUB_OUTPUT"
              echo "✅ Allowing auto-merge for $UPDATE_TYPE"
              ;;
            *)
              echo "allowed=false" >> "$GITHUB_OUTPUT"
              echo "⏸️  Skipping auto-merge for $UPDATE_TYPE (requires manual review)"
              ;;
          esac

      - name: Approve PR
        if: steps.check.outputs.allowed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr review "$PR_URL" --approve --body "🤖 Auto-approved — minor/patch dependency update"

      - name: Enable auto-merge
        if: steps.check.outputs.allowed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --auto --squash --body "🤖 Auto-merged by Dependabot"
